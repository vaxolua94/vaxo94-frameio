<!doctype html>
<!--
  MOCK RECEIVER — local stand-in for frame.io's UXPLink bridge.
  Implements the EXACT reported isValidOrigin() + a plausible handleMessage() that resolves
  a pending Apollo-style operation by id. Use this to validate the INJECTION MECHANICS in a
  controlled 2-page setup BEFORE/ALONGSIDE testing the real site — it isolates "does the forge
  work given a handle + passing origin" from "can I get a handle to real frame.io".

  Test: serve this and attacker.html from DIFFERENT origins. Easiest: run attacker.html from a
  host that ends in -frameio.vercel.app (or fake it locally by editing isValidOrigin allowlist).
-->
<meta charset="utf-8"><title>mock frame.io UXP host</title>
<style>body{font:13px monospace;margin:16px}#log{white-space:pre-wrap;border:1px solid #ccc;padding:8px;height:70vh;overflow:auto}</style>
<h3>MOCK frame.io UXPLink receiver</h3>
<div id="log"></div>
<script>
const log = (...a)=>{const l=document.getElementById('log');l.textContent+=a.join(' ')+'\n';l.scrollTop=l.scrollHeight;};

// ----- reported production function, verbatim -----
const VALID_UXP_PLUGIN_IDS = ['com.adobe.frameio.uxp'];
const isValidOrigin = (url) => {
  if (VALID_UXP_PLUGIN_IDS.includes(url)) return true;
  try {
    if (!url) return false;
    const hostUrl = new URL(url);
    if (hostUrl.hostname.endsWith('.frame.io')) return true;
    if (hostUrl.hostname.endsWith('-frameio.vercel.app')) return true;
    return false;
  } catch (e) { return false; }
};

// pending operations keyed by id (as an Apollo bridge would track them)
const pending = new Map();
function fakeApolloOperation(id, name){
  pending.set(id, true);
  log('app issued op', name, 'id='+id, '-> (in real app, also postMessage(op, "*") outbound)');
  // emulate the SECOND defect: broadcast the outbound op to opener with targetOrigin '*'
  if (window.opener) window.opener.postMessage({type:'graphql-request', id, operationName:name, variables:{}}, '*');
}

function handleMessage(e){
  if(!isValidOrigin(e.origin)){ log('REJECTED message from', e.origin); return; }
  const d = e.data||{};
  log('ACCEPTED', d.type, 'from', e.origin, '(origin passed isValidOrigin)');
  if(d.type==='graphql-response' && pending.has(d.id)){
    pending.delete(d.id);
    log('  🔴 resolved pending op '+d.id+' with ATTACKER data:', JSON.stringify(d.result).slice(0,200));
    render(d.result);
  } else if(d.type==='graphql-subscription-data'){
    log('  🔴 fed subscription data (no strict id match needed):', JSON.stringify(d.result).slice(0,200));
    render(d.result);
  }
}
function render(r){ document.title='SPOOFED: '+(JSON.stringify(r).slice(0,40)); }

addEventListener('message', handleMessage);
log('isValidOrigin self-tests:');
['https://x-frameio.vercel.app','https://evil-frameio.vercel.app','https://app.frame.io','https://evil.com']
  .forEach(o=>log('  ', o, '->', isValidOrigin(o)));

// emulate the app issuing one operation shortly after load (so attacker can capture the id via the leak)
setTimeout(()=>fakeApolloOperation('op-'+Math.random().toString(36).slice(2,8), 'GetCurrentUser'), 1000);
log('mock receiver ready; waiting for messages...');
</script>
